<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Phishing Detection AI</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body {
            background: white;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .auth-subtitle {
            color: #6b7280;
            font-size: 1rem;
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-label {
            font-weight: 500;
            color: #374151;
            font-size: 0.9rem;
        }
        
        .form-input {
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .auth-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #6b7280;
        }
        
        .auth-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-link:hover {
            text-decoration: underline;
        }
        
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-link:hover {
            color: #374151;
        }
        
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid #fecaca;
            display: none;
        }
        
        .success-message {
            background: #f0fdf4;
            color: #059669;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid #bbf7d0;
            display: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .password-match {
            font-size: 0.8rem;
            color: #059669;
            margin-top: 0.25rem;
        }
        
        .password-mismatch {
            font-size: 0.8rem;
            color: #dc2626;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">
        ← Back to Home
    </a>
    
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">🛡️ Phishing Detection AI</div>
            <div class="auth-subtitle">Create your account</div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form class="auth-form" id="signUpForm">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="Enter your email"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="Create a password"
                    required
                    minlength="6"
                >
            </div>
            
            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    class="form-input" 
                    placeholder="Confirm your password"
                    required
                >
                <div id="passwordMatch" class="password-match" style="display: none;">
                    ✓ Passwords match
                </div>
                <div id="passwordMismatch" class="password-mismatch" style="display: none;">
                    ✗ Passwords do not match
                </div>
            </div>
            
            <button type="submit" class="auth-button" id="signUpBtn">
                <span id="signUpText">Sign Up</span>
                <span id="signUpLoading" class="loading" style="display: none;"></span>
            </button>
        </form>
        
        <div class="auth-footer">
            Already have an account? 
            <a href="sign-in.html" class="auth-link">Sign In</a>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // Sign Up Page JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Sign Up page loaded');
            
            // Check if user is already authenticated
            if (typeof firebase !== 'undefined' && firebase.auth) {
                firebase.auth().onAuthStateChanged((user) => {
                    if (user) {
                        console.log('User already authenticated:', user.email);
                        window.location.href = 'dashboard.html';
                    }
                });
            }
            
            // Password confirmation validation
            const password = document.getElementById('password');
            const confirmPassword = document.getElementById('confirmPassword');
            const passwordMatch = document.getElementById('passwordMatch');
            const passwordMismatch = document.getElementById('passwordMismatch');
            
            function validatePasswords() {
                const passwordValue = password.value;
                const confirmPasswordValue = confirmPassword.value;
                
                if (confirmPasswordValue.length === 0) {
                    passwordMatch.style.display = 'none';
                    passwordMismatch.style.display = 'none';
                    return false;
                }
                
                if (passwordValue === confirmPasswordValue) {
                    passwordMatch.style.display = 'block';
                    passwordMismatch.style.display = 'none';
                    return true;
                } else {
                    passwordMatch.style.display = 'none';
                    passwordMismatch.style.display = 'block';
                    return false;
                }
            }
            
            password.addEventListener('input', validatePasswords);
            confirmPassword.addEventListener('input', validatePasswords);
            
            // Set up form submission
            const signUpForm = document.getElementById('signUpForm');
            const signUpBtn = document.getElementById('signUpBtn');
            const signUpText = document.getElementById('signUpText');
            const signUpLoading = document.getElementById('signUpLoading');
            
            signUpForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const passwordValue = password.value.trim();
                const confirmPasswordValue = confirmPassword.value.trim();
                
                if (!email || !passwordValue || !confirmPasswordValue) {
                    showError('Please fill in all fields');
                    return;
                }
                
                if (passwordValue.length < 6) {
                    showError('Password must be at least 6 characters long');
                    return;
                }
                
                if (!validatePasswords()) {
                    showError('Passwords do not match');
                    return;
                }
                
                // Show loading state
                signUpBtn.disabled = true;
                signUpText.style.display = 'none';
                signUpLoading.style.display = 'inline-block';
                hideMessages();
                
                try {
                    const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, passwordValue);
                    
                    // Create user document in Firestore
                    await firebase.firestore().collection('users').doc(userCredential.user.uid).set({
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        plan: 'free',
                        emailsAnalyzed: 0,
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    showSuccess('Account created successfully! Redirecting...');
                    
                    // Redirect to dashboard after a short delay
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                    
                } catch (error) {
                    console.error('Sign up error:', error);
                    let errorMessage = 'Sign up failed. Please try again.';
                    
                    switch (error.code) {
                        case 'auth/email-already-in-use':
                            errorMessage = 'An account with this email already exists.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage = 'Please enter a valid email address.';
                            break;
                        case 'auth/weak-password':
                            errorMessage = 'Password is too weak. Please choose a stronger password.';
                            break;
                    }
                    
                    showError(errorMessage);
                } finally {
                    // Hide loading state
                    signUpBtn.disabled = false;
                    signUpText.style.display = 'inline';
                    signUpLoading.style.display = 'none';
                }
            });
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>
</body>
</html>
